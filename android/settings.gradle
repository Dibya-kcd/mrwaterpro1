pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def propertiesFile = file("local.properties")
        if (propertiesFile.exists()) {
            propertiesFile.withInputStream { properties.load(it) }
        }
        // 1. Try local.properties first (local dev)
        def sdkPath = properties.getProperty("flutter.sdk")
        // 2. Fall back to FLUTTER_ROOT env var (CI/CD)
        if (sdkPath == null || sdkPath.trim().isEmpty()) {
            sdkPath = System.getenv("FLUTTER_ROOT")
        }
        if (sdkPath == null || sdkPath.trim().isEmpty()) {
            throw new GradleException(
                "Flutter SDK not found.\n" +
                "  - Local dev: set flutter.sdk in android/local.properties\n" +
                "  - CI/CD: set the FLUTTER_ROOT environment variable"
            )
        }
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.3.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
    id "com.google.gms.google-services" version "4.4.1" apply false
}

include ":app"
