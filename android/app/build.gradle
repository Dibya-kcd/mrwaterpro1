plugins {
    id "com.android.application"
    id "kotlin-android"
    // Flutter plugin — must come AFTER android + kotlin
    id "dev.flutter.flutter-gradle-plugin"
    // Firebase Google Services — processes google-services.json
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// ── Keystore for release signing ──────────────────────────────────────────────
// Create android/key.properties with:
//   storePassword=<your_keystore_password>
//   keyPassword=<your_key_password>
//   keyAlias=<your_key_alias>
//   storeFile=<path_to_keystore.jks>   e.g. ../mrwater-release.jks
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

// 🔐 CI/CD Secret Bypass — Only use keystore if the file actually exists on disk
// This prevents build failure on GitHub Actions if secrets aren't set up yet.
def storeFileExists = false
if (hasKeystore && keystoreProperties['storeFile']) {
    try {
        def sf = file(keystoreProperties['storeFile'])
        storeFileExists = sf.exists()
    } catch (Exception e) {
        // If file path is invalid (like a Windows path on Linux), ignore it
        storeFileExists = false
    }
}
def canSignRelease = hasKeystore && storeFileExists

android {
    namespace "com.mrwater.mrwaterprov1"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        // Required by firebase_database and other Firebase SDKs on older Android
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        // Enable core library desugaring — needed for java.time APIs on API < 26
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.mrwater.mrwaterprov1"
        // Firebase Auth requires minSdk 23+.
        // speech_to_text and video_player also work best at 23+.
        minSdk 23
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        // Required for google_mlkit_text_recognition — enables multidex for large apps
        multiDexEnabled true
    }

    // ── Release signing config ─────────────────────────────────────────────────
    signingConfigs {
        if (canSignRelease) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        debug {
            // Debug builds are signed with debug key automatically
            applicationIdSuffix ".debug"
            debuggable true
        }
        release {
            // Use release keystore if configured, otherwise fall back to debug key
            // (debug key APKs work but cannot be published to Play Store)
            if (canSignRelease) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
            // Shrink & obfuscate for smaller APK
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // ── Split APKs by ABI — reduces download size on Play Store ───────────────
    // Commented out to produce a single universal APK
    // splits {
    //     abi {
    //         enable true
    //         reset()
    //         include "arm64-v8a", "armeabi-v7a", "x86_64"
    //         universalApk true   // also produce a fat APK that works on all devices
    //     }
    // }
}

flutter {
    source '../..'
}

dependencies {
    // Core library desugaring — enables java.time on API < 26
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10"

    // Firebase BoM — manages all Firebase SDK versions consistently
    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-database-ktx'
    implementation 'com.google.firebase:firebase-auth-ktx'
    implementation 'com.google.firebase:firebase-storage-ktx'

    // MultiDex support — required when app exceeds 64K method limit
    implementation 'androidx.multidex:multidex:2.0.1'
}
