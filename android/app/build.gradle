plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

def canSignRelease = System.getenv("KEYSTORE_STORE_PASSWORD") != null || (hasKeystore && keystoreProperties['storeFile'] != null)

android {
    namespace "com.mrwater.mrwaterprov1"
    // FIX: Bumped to 35 to satisfy firebase-bom 33.x and latest ML Kit requirements.
    // compileSdk 34 caused implicit dependency conflicts with newer Firebase/MLKit AAR targets.
    compileSdk 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    // FIX: Removed duplicate/conflicting srcDirs block.
    // The old config added both java and kotlin to main.java.srcDirs which can
    // confuse the Android Gradle Plugin. The flutter plugin handles source sets
    // automatically; manual overrides here are not needed and cause issues.

    defaultConfig {
        applicationId "com.mrwater.mrwaterprov1"
        minSdkVersion flutter.minSdkVersion
        // FIX: targetSdk bumped to 35 to match compileSdk.
        // Mismatched compileSdk/targetSdk causes lint and build warnings that
        // can escalate to errors with certain AGP versions.
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            if (System.getenv("KEYSTORE_STORE_PASSWORD") != null) {
                // FIX: Keystore file path must be relative to the app/ directory.
                // In CI the file is written to android/app/mrwater-release.jks,
                // so file("mrwater-release.jks") resolves correctly from app/.
                storeFile file(System.getenv("KEYSTORE_FILE") ?: "mrwater-release.jks")
                storePassword System.getenv("KEYSTORE_STORE_PASSWORD")
                keyAlias System.getenv("KEYSTORE_KEY_ALIAS")
                keyPassword System.getenv("KEYSTORE_KEY_PASSWORD")
            } else if (hasKeystore) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // FIX: Bumped desugar lib to 2.1.4 — required when compileSdk = 35.
    // The older 2.0.4 version causes a build error with AGP 8.x + compileSdk 35.
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'

    // Firebase BOM — controls all Firebase library versions consistently.
    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-database-ktx'
    implementation 'com.google.firebase:firebase-auth-ktx'
    implementation 'com.google.firebase:firebase-storage-ktx'

    implementation 'androidx.multidex:multidex:2.0.1'
}
