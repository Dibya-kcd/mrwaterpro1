plugins {
    id "com.android.application"
    // Flutter plugin — must come AFTER android
    id "dev.flutter.flutter-gradle-plugin"
    // Firebase Google Services — processes google-services.json
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// ── Keystore for release signing ──────────────────────────────────────────────
// Create android/key.properties with:
//   storePassword=<your_keystore_password>
//   keyPassword=<your_key_password>
//   keyAlias=<your_key_alias>
//   storeFile=<path_to_keystore.jks>   e.g. ../mrwater-release.jks
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

// 🔐 CI/CD Secret Bypass — Use Environment Variables if available (GitHub Actions)
// This avoids needing a key.properties file in the CI environment.
def keystoreFile = project.hasProperty('RELEASE_STORE_FILE') ? file(project.getProperty('RELEASE_STORE_FILE')) : null
if (System.getenv("KEYSTORE_FILE")) {
    keystoreFile = file(System.getenv("KEYSTORE_FILE"))
} else if (hasKeystore && keystoreProperties['storeFile']) {
    keystoreFile = file(keystoreProperties['storeFile'])
}

def canSignRelease = (keystoreFile != null && keystoreFile.exists()) || System.getenv("KEYSTORE_PASSWORD") != null

android {
    namespace "com.mrwater.mrwaterprov1"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        // Required by firebase_database and other Firebase SDKs on older Android
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        // Enable core library desugaring — needed for java.time APIs on API < 26
        coreLibraryDesugaringEnabled true
    }

    sourceSets {
        main.java.srcDirs += 'src/main/java'
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.mrwater.mrwaterprov1"
        // Firebase Auth requires minSdk 23+.
        // speech_to_text and video_player also work best at 23+.
        minSdk 23
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        // Required for google_mlkit_text_recognition — enables multidex for large apps
        multiDexEnabled true
    }

    // ── Release signing config ─────────────────────────────────────────────────
    signingConfigs {
        release {
            if (System.getenv("KEYSTORE_PASSWORD")) {
                // Use Environment Variables (CI/CD)
                storeFile keystoreFile
                storePassword System.getenv("KEYSTORE_STORE_PASSWORD")
                keyAlias System.getenv("KEYSTORE_KEY_ALIAS")
                keyPassword System.getenv("KEYSTORE_KEY_PASSWORD")
            } else if (canSignRelease) {
                // Use key.properties (Local)
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreFile
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        debug {
            // Debug builds are signed with debug key automatically
            applicationIdSuffix ".debug"
            debuggable true
        }
        release {
            // Use release keystore if configured, otherwise fall back to debug key
            // (debug key APKs work but cannot be published to Play Store)
            if (canSignRelease) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
            // Shrink & obfuscate for smaller APK
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // ── Split APKs by ABI — reduces download size on Play Store ───────────────
    // Commented out to produce a single universal APK
    // splits {
    //     abi {
    //         enable true
    //         reset()
    //         include "arm64-v8a", "armeabi-v7a", "x86_64"
    //         universalApk true   // also produce a fat APK that works on all devices
    //     }
    // }
}

flutter {
    source '../..'
}

dependencies {
    // Core library desugaring — enables java.time on API < 26
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // 🛠️ Force-add the Flutter embedding to fix "Unresolved reference: io.flutter" 
    // This is sometimes needed when the Gradle plugin fails to inject it automatically.
    implementation "io.flutter:flutter_embedding_release:1.0.0-+"

    // Firebase BoM — manages all Firebase SDK versions consistently
    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-database-ktx'
    implementation 'com.google.firebase:firebase-auth-ktx'
    implementation 'com.google.firebase:firebase-storage-ktx'

    // MultiDex support — required when app exceeds 64K method limit
    implementation 'androidx.multidex:multidex:2.0.1'
}
