# key.properties — Release keystore configuration
# Place this file at: android/key.properties
#
# ⚠️  NEVER commit this file to Git — it contains your signing credentials.
#    Add to .gitignore:  android/key.properties
#
# HOW TO CREATE YOUR RELEASE KEYSTORE (do this once):
#
#   keytool -genkey -v \
#     -keystore mrwater-release.jks \
#     -keyalg RSA -keysize 2048 \
#     -validity 10000 \
#     -alias mrwater-key
#
#   → Save mrwater-release.jks somewhere safe (NOT inside the project folder)
#   → Remember the passwords you set
#
# Then fill in the values below:
# ══════════════════════════════════════════════════════════════════════════════

