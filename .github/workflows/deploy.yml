name: 🌐 Deploy Web + 📱 Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
# ══════════════════════════════════════════════════════════════════════════
# JOB 1 — Build Flutter Web + Deploy to GitHub Pages
# ══════════════════════════════════════════════════════════════════════════
  deploy-web:
    name: 🌐 Web → GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: 📦 Flutter pub get
        run: flutter pub get

      - name: 🌐 Build Flutter Web
        run: |
          cat > dart_defines.json << EOF
          {
            "FIREBASE_API_KEY": "${{ secrets.FIREBASE_API_KEY }}",
            "FIREBASE_AUTH_DOMAIN": "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            "FIREBASE_DATABASE_URL": "${{ secrets.FIREBASE_DATABASE_URL }}",
            "FIREBASE_PROJECT_ID": "${{ secrets.FIREBASE_PROJECT_ID }}",
            "FIREBASE_STORAGE_BUCKET": "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            "FIREBASE_MESSAGING_SENDER_ID": "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            "FIREBASE_APP_ID": "${{ secrets.FIREBASE_APP_ID_WEB }}",
            "FIREBASE_APP_ID_ANDROID": "${{ secrets.FIREBASE_APP_ID_ANDROID }}"
          }
          EOF
          flutter build web --release --base-href "/mrwaterprov1/" --dart-define-from-file=dart_defines.json

      - name: 🚀 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages

# ══════════════════════════════════════════════════════════════════════════
# JOB 2 — Build Android APK (Secure)
# ══════════════════════════════════════════════════════════════════════════
  build-apk:
    name: 📱 Android APK
    runs-on: ubuntu-latest
    steps:

      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: 📦 Flutter pub get
        run: flutter pub get

      - name: 🔨 Build APK
        run: |
          cat > dart_defines.json << EOF
          {
            "FIREBASE_API_KEY": "${{ secrets.FIREBASE_API_KEY }}",
            "FIREBASE_AUTH_DOMAIN": "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            "FIREBASE_DATABASE_URL": "${{ secrets.FIREBASE_DATABASE_URL }}",
            "FIREBASE_PROJECT_ID": "${{ secrets.FIREBASE_PROJECT_ID }}",
            "FIREBASE_STORAGE_BUCKET": "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            "FIREBASE_MESSAGING_SENDER_ID": "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            "FIREBASE_APP_ID": "${{ secrets.FIREBASE_APP_ID_WEB }}",
            "FIREBASE_APP_ID_ANDROID": "${{ secrets.FIREBASE_APP_ID_ANDROID }}"
          }
          EOF
          flutter build apk --release --dart-define-from-file=dart_defines.json

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrwater-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 🏷️ Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "MrWater Build ${{ github.run_number }}"
          body: |
            ### Download APK
            - **app-release.apk** — Universal installer for all Android phones
          files: |
            build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
